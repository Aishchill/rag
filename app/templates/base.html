<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}KnowledgeBase AI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
  {% if session.user_id %}
  <nav class="navbar">
    <a href="{{ url_for('main.dashboard') }}" class="nav-brand">⬡ KnowledgeBase</a>
    <div class="nav-links">
      <a href="{{ url_for('main.dashboard') }}" class="{% if request.endpoint == 'main.dashboard' %}active{% endif %}">Documents</a>
      <a href="{{ url_for('main.chat') }}" class="{% if request.endpoint == 'main.chat' %}active{% endif %}">Ask AI</a>
      <span class="nav-user">{{ session.username }}</span>
      <a href="{{ url_for('main.logout') }}" class="btn-logout">Logout</a>
    </div>
  </nav>
  {% endif %}

  <main class="main-content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
